<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chand Raat Mubarak!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, #0c1445, #000000);
            color: #f0e68c;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .moon {
            width: 100px;
            height: 100px;
            background: #f0e68c;
            border-radius: 50%;
            box-shadow: 0 0 60px #f0e68c;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.8rem;
            margin: 10px;
            text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.3);
        }

        .bestie-name {
            font-size: 3rem;
            color: #ffffff;
            text-shadow: 0 0 20px #f0e68c, 0 0 40px #f0e68c;
            margin: 20px 0;
            font-weight: bold;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 20px #f0e68c; }
            50% { transform: scale(1.05); text-shadow: 0 0 40px #f0e68c, 0 0 60px #fff; }
            100% { transform: scale(1); text-shadow: 0 0 20px #f0e68c; }
        }

        p {
            font-size: 1.4rem;
            max-width: 85%;
            line-height: 1.6;
        }

        .footer {
            margin-top: 50px;
            font-style: italic;
            font-size: 1.2rem;
            color: #fff;
            border-top: 1px solid rgba(240, 230, 140, 0.3);
            padding-top: 10px;
        }

        .stars {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: blink 2s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 0.2; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="moon"></div>
    <h1>Chand Raat Mubarak Ho!</h1>
    
    <div class="bestie-name">Mubeen Tahir</div>
    
    <p>May this blessed night bring you and your family <br> infinite joy, peace, and prosperity. ✨</p>
    
    <div class="footer">— Best Wishes from Atif Majeed</div>

    <script>
        // Generating 150 stars for a magical night sky
        for (let i = 0; i < 150; i++) {
            let star = document.createElement('div');
            star.className = 'stars';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.fontSize = (Math.random() * 3) + 'px';
            document.body.appendChild(star);
        }
    </script>
</body>
</html>
